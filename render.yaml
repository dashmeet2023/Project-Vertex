databases:
  - name: vertex-db
    databaseName: vertex
    user: vertex_app

services:
  # Backend Web Service
  - type: web
    name: vertex-backend
    env: python
    buildCommand: "cd backend && pip install -e . && alembic upgrade head"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vertex-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://vertex-frontend.onrender.com"

  # Frontend Static Site
  - type: web
    name: vertex-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: vertex-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
